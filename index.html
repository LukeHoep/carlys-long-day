<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carly's Long Day</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
  canvas { display: block; image-rendering: pixelated; border: 3px solid #444; }
  #info { color: #555; font-size: 11px; margin-top: 6px; }
</style>
</head>
<body>
<canvas id="game" width="800" height="450"></canvas>
<div id="info">WASD / Arrows to move &nbsp;|&nbsp; SPACE or W to jump &nbsp;|&nbsp; Jump on enemies to defeat them</div>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const W = 800, H = 450;
const GRAVITY = 0.55;
const GROUND_Y = 370;
const PLAYER_SPD = 3.8;
const JUMP_V = -13;
const CHASE_RANGE = 220;
const INSULT_DMG = 10;
const TOUCH_DMG = 18;
const HEALTH_MAX = 100;

const DAYS = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];

const DAY_THEMES = [
  { sky1:'#090918', sky2:'#1a0e2e', desc:'Just another Monday. The regulars are restless.' },
  { sky1:'#060e1a', sky2:'#0e2040', desc:'Tuesday. A few more mean ladies out tonight.' },
  { sky1:'#120818', sky2:'#280e3a', desc:"Hump day. They've had time to build up complaints." },
  { sky1:'#180808', sky2:'#2e0e1a', desc:'Thursday. The weekend crowd is warming up early.' },
  { sky1:'#080808', sky2:'#181020', desc:"Friday. They've been drinking since noon." },
  { sky1:'#040a18', sky2:'#081830', desc:'Saturday. Pure chaos. Stay sharp.' },
  { sky1:'#120606', sky2:'#200808', desc:'Sunday. The longest shift. Mega Karen awaits.' },
];

const INSULTS = [
  "I'VE BEEN WAITING!","I KNOW THE OWNER!","SNAP SNAP!",
  "DO YOU KNOW WHO I AM?","EXCUSE ME?!","GET ME YOUR MANAGER!",
  "THIS IS UNACCEPTABLE!","I'M A REGULAR!","WHERE'S MY DRINK?!",
  "IS THIS YOUR FIRST DAY?!","I'LL LEAVE A BAD REVIEW!",
  "SPEAK TO YOUR SUPERIOR!","THE CUSTOMER IS ALWAYS RIGHT!",
  "I WANT A DISCOUNT!","MY HUSBAND IS A LAWYER.",
  "CAN I SPEAK TO SOMEONE ELSE?","THIS IS EMBARRASSING FOR YOU.",
];

const BOSS_INSULTS = [
  "I DEMAND TO SEE THE OWNER!!","I HAVE BEEN COMING HERE FOR YEARS!!!",
  "THIS IS ABSOLUTELY OUTRAGEOUS!!!","DO YOU KNOW WHO MY FATHER IS?!",
  "I WILL SHUT THIS PLACE DOWN!!!","YOU WILL REGRET THIS!!!",
];

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('carlysLongDayLB') || '[]'); }
  catch { return []; }
}
function saveToLeaderboard(s) {
  const lb = getLeaderboard();
  lb.push({ score: s, date: new Date().toLocaleDateString() });
  lb.sort((a,b) => b.score - a.score);
  lb.splice(8);
  localStorage.setItem('carlysLongDayLB', JSON.stringify(lb));
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const ST = { TITLE:0, INTRO:1, PLAY:2, COMPLETE:3, GAMEOVER:4, WIN:5 };
let state, day, lives, score, dayScore;
let player, enemies, collectibles, platforms, bgObjects, tessa, projectiles, boss;
let levelW, camera;
let introTimer, completeTimer;
let scoreSaved = false;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ─── INPUT ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) { keys[e.code] = true; onKeyDown(e.code); }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function onKeyDown(code) {
  const jump = code === 'Space' || code === 'KeyW' || code === 'ArrowUp';
  if (state === ST.TITLE    && (code === 'Space' || code === 'Enter')) { startGame(); return; }
  if (state === ST.PLAY     && jump && player.onGround) { player.vy = JUMP_V; player.onGround = false; }
  if (state === ST.COMPLETE && code === 'Space') { advanceDay(); return; }
  if (state === ST.GAMEOVER && code === 'Space') { state = ST.TITLE; return; }
  if (state === ST.WIN      && code === 'Space') { state = ST.TITLE; return; }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b)); }
function pick(arr) { return arr[randInt(0, arr.length)]; }
function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function pixelRect(x, y, w, h, col) {
  ctx.fillStyle = col; ctx.fillRect(Math.round(x), Math.round(y), w, h);
}
function drawText(text, x, y, size, col, align='center') {
  ctx.font = `bold ${size}px monospace`; ctx.fillStyle = col;
  ctx.textAlign = align; ctx.fillText(text, Math.round(x), Math.round(y));
}

// ─── BUILDING / BACKGROUND ────────────────────────────────────────────────────
function buildingColor() {
  return pick(['#2a2a4a','#3a2a3a','#1e3a2a','#3a3020','#2a1e3a','#1a2a3a','#3a2010']);
}
function generateWindows(bw, bh) {
  const wins = [];
  for (let wy = 12; wy < bh - 20; wy += 24)
    for (let wx = 8; wx < bw - 8; wx += 18)
      if (Math.random() < 0.55) wins.push({ wx, wy, lit: Math.random() < 0.65 });
  return wins;
}

// ─── PLATFORM GROUP BUILDERS ──────────────────────────────────────────────────
function mkPl(x, y, w, h, color, label) { return { x, y, w, h, color, label }; }

function mkGroupSingle(x) {
  const defs = [
    [90, 14, '#6B4423', 'bench'],
    [96, 44, '#2a5a2a', 'dumpster'],
    [56, 44, '#8a7040', 'crate'],
  ];
  const [w, elev, col, lbl] = pick(defs);
  return [mkPl(x, GROUND_Y - elev, w, elev, col, lbl)];
}

function mkGroupStepUp(x) {
  // Low dumpster + awning reachable from ground or dumpster (easy step)
  const stepW = pick([80, 96, 64]);
  return [
    mkPl(x,              GROUND_Y - 44,  stepW, 44, '#2a5a2a', 'dumpster'),
    mkPl(x + stepW + 60, GROUND_Y - 100, 110,   10, '#882200', 'awning'),
  ];
}

function mkGroupBoost(x) {
  // Jump on dumpster FIRST, then jump again to reach elevated awning.
  // Awning at 183px above ground: NOT reachable from ground (ground jump peak=147px),
  // but reachable from dumpster top (dumpster adds 44px → peak=191px from ground).
  const dumpW = pick([80, 96]);
  return [
    mkPl(x,           GROUND_Y - 44,  dumpW, 44, '#2a5a2a', 'dumpster'),
    mkPl(x + dumpW/2 - 10, GROUND_Y - 183, 110, 10, '#aa3300', 'awning'),
  ];
}

function mkGroupStaircase(x) {
  // Three steps. Top awning (183px) requires jumping from the middle awning — NOT reachable from ground.
  return [
    mkPl(x,       GROUND_Y - 44,  80,  44, '#2a5a2a', 'dumpster'),
    mkPl(x + 115, GROUND_Y - 100, 90,  10, '#882200', 'awning'),
    mkPl(x + 225, GROUND_Y - 183, 110, 10, '#aa3300', 'awning'),
  ];
}

function mkGroupAwning(x) {
  // Crate on ground, awning at 162px. NOT reachable from ground (peak=147px),
  // reachable from crate top (peak=191px from ground). Crate gives enough clearance below awning.
  return [
    mkPl(x - 5,  GROUND_Y - 44,  84, 44, '#8a7040', 'crate'),
    mkPl(x - 20, GROUND_Y - 162, 130, 10, '#882200', 'awning'),
  ];
}

function mkGroupTower(x) {
  // Three levels. Middle crate at 120px (reachable from ground or dumpster).
  // Top awning at 205px (NOT reachable from ground, NOT from dumpster alone — must use crate).
  // Gaps are large enough that Carly can stand on each level without clipping the level above.
  return [
    mkPl(x,      GROUND_Y - 44,  96, 44, '#2a5a2a', 'dumpster'),
    mkPl(x + 10, GROUND_Y - 122, 76, 10, '#8a7040', 'crate'),
    mkPl(x - 20, GROUND_Y - 205, 140,10, '#882200', 'awning'),
  ];
}

// ─── ITEM PLACEMENT HELPER ────────────────────────────────────────────────────
// Returns true if a collectible at (cx, cy) would be inside any platform body.
function itemClearOfPlatforms(cx, cy, allPlats) {
  const box = { x: cx - 2, y: cy - 2, w: 20, h: 22 };
  return !allPlats.some(pl => overlap(box, pl));
}

// ─── LEVEL GENERATION ─────────────────────────────────────────────────────────
function generateLevel(d) {
  levelW = 3200 + d * 600;
  camera = 0;
  platforms = []; enemies = []; collectibles = []; projectiles = [];
  bgObjects = []; boss = null;

  // Background
  let bx = 0;
  while (bx < levelW) {
    if (Math.random() < 0.25) {
      bgObjects.push({ type: 'light', x: bx });
      bx += randInt(100, 180);
    } else {
      const bw = randInt(70, 140), bh = randInt(100, 220);
      bgObjects.push({ type:'building', x:bx, w:bw, h:bh, color:buildingColor(), wins:generateWindows(bw,bh) });
      bx += bw + randInt(10, 40);
    }
  }

  // Platforms — progressive groups
  const highPlats = [];
  let px = 450;
  const numGroups = 8 + d * 3;

  for (let g = 0; g < numGroups; g++) {
    if (px > levelW - 500) break;
    const t = Math.random();
    let group;
    if (d === 0) {
      group = t < 0.65 ? mkGroupSingle(px) : mkGroupStepUp(px);
    } else if (d === 1) {
      group = t < 0.25 ? mkGroupSingle(px) : t < 0.55 ? mkGroupStepUp(px) : t < 0.80 ? mkGroupStaircase(px) : mkGroupBoost(px);
    } else if (d === 2) {
      group = t < 0.10 ? mkGroupSingle(px) : t < 0.30 ? mkGroupStepUp(px) : t < 0.55 ? mkGroupStaircase(px) : t < 0.75 ? mkGroupAwning(px) : mkGroupBoost(px);
    } else if (d === 3) {
      group = t < 0.05 ? mkGroupSingle(px) : t < 0.20 ? mkGroupStepUp(px) : t < 0.40 ? mkGroupStaircase(px) : t < 0.60 ? mkGroupAwning(px) : t < 0.78 ? mkGroupTower(px) : mkGroupBoost(px);
    } else {
      group = t < 0.08 ? mkGroupStepUp(px) : t < 0.28 ? mkGroupStaircase(px) : t < 0.50 ? mkGroupAwning(px) : t < 0.72 ? mkGroupTower(px) : mkGroupBoost(px);
    }

    for (const pl of group) {
      platforms.push(pl);
      if (pl.y < GROUND_Y - 70) highPlats.push(pl);
    }
    const rightmost = Math.max(...group.map(p => p.x + p.w));
    px = rightmost + randInt(Math.max(140, 200 - d * 8), Math.max(200, 300 - d * 10));
  }

  // Enemies
  const numEnemies = 2 + Math.floor(d * 1.5);
  const speed = 1.0 + d * 0.25;
  for (let i = 0; i < numEnemies; i++) {
    const ex = 600 + (i / numEnemies) * (levelW - (d === 6 ? 1400 : 900));
    enemies.push(mkEnemy(ex, speed));
  }

  // Boss arena for Sunday (day 6).
  // Boss head top is at GROUND_Y-120=250. Player must stomp it from ABOVE.
  // Platform at GROUND_Y-140=230 lets player walk onto it and fall/jump down onto boss head.
  if (d === 6) {
    const arenaX = levelW - 1150;
    boss = mkBoss(arenaX + 380);
    // Left approach: dumpster → awning → high awning above boss
    platforms.push(mkPl(arenaX,           GROUND_Y - 44,  110, 44, '#2a5a2a', 'dumpster'));
    platforms.push(mkPl(arenaX + 130,     GROUND_Y - 100, 100, 10, '#882200', 'awning'));
    platforms.push(mkPl(arenaX + 240,     GROUND_Y - 140, 120, 10, '#aa2200', 'awning'));
    // Right approach: dumpster → awning → high awning
    platforms.push(mkPl(arenaX + 560,     GROUND_Y - 44,  110, 44, '#2a5a2a', 'dumpster'));
    platforms.push(mkPl(arenaX + 450,     GROUND_Y - 100, 100, 10, '#882200', 'awning'));
    platforms.push(mkPl(arenaX + 340,     GROUND_Y - 140, 120, 10, '#aa2200', 'awning'));
  }

  // Collectibles — wines on platforms and high spots, reeses rare on ground
  const numWine = 14 + d * 4;
  const numReeses = Math.max(1, 2 - Math.floor(d * 0.4));

  // 75% of wine on platforms, preferring high ones
  const shuffled = [...platforms].filter(p => p.w >= 40).sort(() => Math.random() - 0.5);
  let wineCount = 0;

  // Wine on regular platforms (spaced out, one per platform)
  for (const pl of shuffled) {
    if (wineCount >= Math.round(numWine * 0.55)) break;
    const cx = pl.x + randInt(10, Math.max(11, pl.w - 10));
    const cy = pl.y - 26;
    if (itemClearOfPlatforms(cx, cy, platforms))
      collectibles.push({ x: cx, y: cy, type: 'wine', collected: false });
    wineCount++;
  }
  // Extra wine on every high platform (the reward for climbing)
  for (const hp of highPlats) {
    if (hp.w < 40) continue;
    const cx = hp.x + hp.w / 2;
    const cy = hp.y - 26;
    if (itemClearOfPlatforms(cx, cy, platforms))
      collectibles.push({ x: cx, y: cy, type: 'wine', collected: false });
    wineCount++;
  }
  // Remaining wine on ground (25%)
  const groundWine = Math.max(0, numWine - wineCount);
  for (let i = 0; i < groundWine; i++) {
    const cx = 300 + Math.random() * (levelW - (d === 6 ? 1500 : 600));
    const cy = GROUND_Y - 26;
    if (itemClearOfPlatforms(cx, cy, platforms))
      collectibles.push({ x: cx, y: cy, type: 'wine', collected: false });
  }

  // Reeses on ground
  for (let i = 0; i < numReeses; i++) {
    const cx = 400 + Math.random() * (levelW - (d === 6 ? 1600 : 700));
    collectibles.push({ x: cx, y: GROUND_Y - 26, type: 'reeses', collected: false });
  }

  tessa = { x: levelW - 150, y: GROUND_Y - 52, w: 28, h: 52 };
}

// ─── ENTITY FACTORIES ─────────────────────────────────────────────────────────
function mkEnemy(x, speed) {
  return {
    x, y: GROUND_Y - 48, w: 24, h: 48,
    speed, vx: speed, vy: 0, onGround: true,
    patrolL: x - 90, patrolR: x + 90,
    mode: 'patrol',
    insult: null, insultTimer: 0, insultCooldown: randInt(60, 120),
    stomped: false, stompTimer: 0,
    animF: 0, animT: 0, facingR: true,
    hairColor: pick(['#FFD700','#FF8C00','#CC0000','#FFFFFF','#CC44CC']),
    outfitColor: pick(['#FF1493','#FF6600','#9900CC','#00AACC','#FF4444']),
  };
}

function mkBoss(x) {
  return {
    x, y: GROUND_Y - 120, w: 60, h: 120,
    hp: 8, maxHp: 8,
    speed: 1.4, vx: 1.4,
    patrolL: x - 280, patrolR: x + 280,
    mode: 'patrol',
    insult: null, insultTimer: 0, insultCooldown: 70,
    defeated: false, defeatTimer: 0,
    invFrames: 0,
    animF: 0, animT: 0, facingR: true,
  };
}

function mkPlayer() {
  return {
    x: 80, y: GROUND_Y - 48, w: 24, h: 48,
    vx: 0, vy: 0, onGround: false,
    health: HEALTH_MAX, invFrames: 0,
    facingR: true, animF: 0, animT: 0,
  };
}

// ─── GAME FLOW ────────────────────────────────────────────────────────────────
function startGame() {
  lives = 3; score = 0; day = 0; scoreSaved = false;
  beginDay();
}
function beginDay() {
  dayScore = 0; player = mkPlayer();
  generateLevel(day); state = ST.INTRO; introTimer = 150;
}
function restartDay() {
  player = mkPlayer(); generateLevel(day); state = ST.INTRO; introTimer = 100;
}
function advanceDay() {
  score += dayScore; day++;
  if (day >= 7) {
    if (!scoreSaved) { saveToLeaderboard(score); scoreSaved = true; }
    state = ST.WIN;
  } else { beginDay(); }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  if (state === ST.INTRO)    { if (--introTimer <= 0) state = ST.PLAY; return; }
  if (state === ST.COMPLETE) { if (--completeTimer <= 0) advanceDay(); return; }
  if (state !== ST.PLAY) return;
  updatePlayer();
  updateEnemies();
  updateBoss();
  updateProjectiles();
  updateCollectibles();
  updateCamera();
  checkTessa();
}

function applyPlatformCollision(entity) {
  if (entity.y + entity.h > GROUND_Y) { entity.y = GROUND_Y - entity.h; entity.vy = 0; entity.onGround = true; }
  for (const pl of platforms) {
    if (!overlap(entity, pl)) continue;
    const prevBottom = entity.y + entity.h - entity.vy;
    const prevLeft   = entity.x - (entity.vx || 0);
    const prevRight  = entity.x + entity.w - (entity.vx || 0);
    if ((entity.vy||0) >= 0 && prevBottom <= pl.y + 4) {
      entity.y = pl.y - entity.h; entity.vy = 0; entity.onGround = true;
    } else if ((entity.vy||0) < 0 && entity.y - (entity.vy||0) >= pl.y + pl.h - 4) {
      entity.y = pl.y + pl.h; entity.vy = 0;
    } else if (prevRight <= pl.x + 6) {
      entity.x = pl.x - entity.w;
      if (entity.vx !== undefined) entity.vx = Math.abs(entity.vx);
    } else if (prevLeft >= pl.x + pl.w - 6) {
      entity.x = pl.x + pl.w;
      if (entity.vx !== undefined) entity.vx = -Math.abs(entity.vx);
    }
  }
}

function updatePlayer() {
  const p = player;
  if (keys['KeyA'] || keys['ArrowLeft'])       { p.vx = -PLAYER_SPD; p.facingR = false; }
  else if (keys['KeyD'] || keys['ArrowRight']) { p.vx = PLAYER_SPD;  p.facingR = true;  }
  else p.vx *= 0.7;

  p.vy += GRAVITY; p.x += p.vx; p.y += p.vy;
  if (p.x < 0) p.x = 0;
  if (p.x + p.w > levelW) p.x = levelW - p.w;

  p.onGround = false;
  applyPlatformCollision(p);
  if (p.invFrames > 0) p.invFrames--;
  if (++p.animT > 7) { p.animT = 0; p.animF = (p.animF + 1) % 2; }
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.stomped) {
      if (--e.stompTimer <= 0) enemies.splice(i, 1);
      continue;
    }

    const dx = (player.x + player.w/2) - (e.x + e.w/2);
    const dist = Math.abs(dx);
    if (dist < CHASE_RANGE) e.mode = 'chase';
    else if (dist > CHASE_RANGE + 150) e.mode = 'patrol';

    // Horizontal movement
    const moveDir = e.mode === 'chase' ? (dx > 0 ? 1 : -1) : Math.sign(e.vx) || 1;
    if (e.mode === 'chase') { e.x += e.speed * 1.6 * moveDir; e.facingR = moveDir > 0; }
    else { e.x += e.vx; e.facingR = e.vx > 0; if (e.x < e.patrolL || e.x > e.patrolR) e.vx *= -1; }

    // Look-ahead: jump over ground-touching obstacles (dumpsters, crates, benches)
    if (e.onGround) {
      const lookX = e.x + (moveDir > 0 ? e.w + 36 : -36);
      for (const pl of platforms) {
        if (pl.y + pl.h < GROUND_Y - 5) continue; // skip floating awnings
        if (lookX >= pl.x && lookX <= pl.x + pl.w) {
          e.vy = JUMP_V * 0.88; // slightly lower arc than player
          e.onGround = false;
          break;
        }
      }
    }

    // Apply gravity and vertical movement
    e.vy += GRAVITY;
    e.y += e.vy;
    e.onGround = false;

    // Ground collision
    if (e.y + e.h >= GROUND_Y) {
      e.y = GROUND_Y - e.h;
      e.vy = 0;
      e.onGround = true;
    }

    // Platform collision (land on top of platforms, clip out of sides)
    for (const pl of platforms) {
      if (!overlap(e, pl)) continue;
      const prevBottom = e.y + e.h - e.vy;
      if (e.vy >= 0 && prevBottom <= pl.y + 6) {
        // Land on top
        e.y = pl.y - e.h; e.vy = 0; e.onGround = true;
      } else if (e.vy < 0 && e.y - e.vy >= pl.y + pl.h - 4) {
        // Bonk ceiling
        e.y = pl.y + pl.h; e.vy = 0;
      } else if (pl.y + pl.h >= GROUND_Y - 5) {
        // Horizontal push only for ground-level obstacles (not floating awnings)
        if (e.x + e.w/2 < pl.x + pl.w/2) { e.x = pl.x - e.w; e.vx = Math.abs(e.vx); }
        else { e.x = pl.x + pl.w; e.vx = -Math.abs(e.vx); }
      }
    }

    // Insults and projectiles (only throw while on ground to avoid mid-air weirdness)
    if (e.mode === 'chase' && e.onGround && --e.insultCooldown <= 0) {
      e.insult = pick(INSULTS); e.insultTimer = 130;
      e.insultCooldown = randInt(140, 220);
      const dir = player.x > e.x ? 1 : -1;
      projectiles.push({ x: e.x + (dir > 0 ? e.w + 2 : -2), y: e.y + e.h - 34, vx: dir * (4 + day * 0.3), spin: 0, type: pick(['purse','phone','glass']) });
    }
    if (e.insultTimer > 0 && --e.insultTimer === 0) e.insult = null;

    // Stomp / touch collision with player
    if (overlap(player, e)) {
      if (player.vy > 0 && player.y + player.h - player.vy <= e.y + 10) {
        e.stomped = true; e.stompTimer = 28; player.vy = -9;
        const pts = 150; score += pts; dayScore += pts;
      } else { takeDamage(TOUCH_DMG); }
    }
    if (++e.animT > 7) { e.animT = 0; e.animF = (e.animF + 1) % 2; }
  }
}

function updateBoss() {
  if (!boss) return;
  if (boss.defeated) {
    boss.defeatTimer++;
    return;
  }

  const dx = (player.x + player.w/2) - (boss.x + boss.w/2);
  const dist = Math.abs(dx);
  if (dist < 350) boss.mode = 'chase'; else if (dist > 500) boss.mode = 'patrol';

  if (boss.mode === 'chase') { const dir = dx > 0 ? 1 : -1; boss.x += boss.speed * 1.5 * dir; boss.facingR = dir > 0; }
  else { boss.x += boss.vx; boss.facingR = boss.vx > 0; if (boss.x < boss.patrolL || boss.x > boss.patrolR) boss.vx *= -1; }

  if (boss.x < 0) boss.x = 0;
  if (boss.y + boss.h > GROUND_Y) boss.y = GROUND_Y - boss.h;

  if (boss.invFrames > 0) boss.invFrames--;

  // Boss throws projectiles frequently
  if (boss.mode === 'chase' && --boss.insultCooldown <= 0) {
    boss.insult = pick(BOSS_INSULTS); boss.insultTimer = 150;
    boss.insultCooldown = randInt(70, 110);
    const dir = player.x > boss.x ? 1 : -1;
    // Boss throws 2 projectiles at slightly different heights
    projectiles.push({ x: boss.x + (dir > 0 ? boss.w + 2 : -2), y: GROUND_Y - 40, vx: dir * 6, spin: 0, type: 'glass' });
    projectiles.push({ x: boss.x + (dir > 0 ? boss.w + 2 : -2), y: GROUND_Y - 80, vx: dir * 5, spin: 0, type: 'purse' });
  }
  if (boss.insultTimer > 0 && --boss.insultTimer === 0) boss.insult = null;

  // Check player stomp on boss HEAD (top 35px of boss sprite)
  let bossStompedThisFrame = false;
  if (boss.invFrames === 0 && overlap(player, { x: boss.x, y: boss.y, w: boss.w, h: 35 })) {
    if (player.vy > 0 && player.y + player.h - player.vy <= boss.y + 30) {
      boss.hp--;
      boss.invFrames = 90;
      player.vy = -16;  // strong bounce
      bossStompedThisFrame = true;
      const pts = 200; score += pts; dayScore += pts;
      if (boss.hp <= 0) { boss.defeated = true; boss.defeatTimer = 0; }
    }
  }
  // Boss body collision — skip if we just stomped this frame (avoids same-frame damage)
  if (!bossStompedThisFrame && overlap(player, boss)) {
    takeDamage(TOUCH_DMG);
  }

  if (++boss.animT > 8) { boss.animT = 0; boss.animF = (boss.animF + 1) % 2; }
}

function takeDamage(amt) {
  if (player.invFrames > 0) return;
  player.health -= amt;
  player.invFrames = 80;
  score = Math.max(0, score - 5);
  dayScore = Math.max(0, dayScore - 5);
  if (player.health <= 0) {
    player.health = 0; lives--;
    if (lives <= 0) { lives = 0; state = ST.GAMEOVER; }
    else restartDay();
  }
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.spin += 0.18;
    if (p.x < camera - 80 || p.x > camera + W + 80) { projectiles.splice(i, 1); continue; }
    if (overlap({ x: p.x - 7, y: p.y - 7, w: 14, h: 14 }, player)) {
      takeDamage(INSULT_DMG); projectiles.splice(i, 1);
    }
  }
}

function updateCollectibles() {
  for (const c of collectibles) {
    if (c.collected) continue;
    if (overlap(player, { x: c.x - 6, y: c.y - 6, w: 28, h: 32 })) {
      c.collected = true;
      if (c.type === 'wine') {
        score += 10; dayScore += 10;
      } else {
        player.health = Math.min(HEALTH_MAX, player.health + 30);
        score += 25; dayScore += 25;
      }
    }
  }
}

function updateCamera() {
  const target = player.x - W / 2 + player.w / 2;
  camera = Math.max(0, Math.min(target, levelW - W));
}

function checkTessa() {
  // On Sunday, must defeat boss first
  if (day === 6 && boss && !boss.defeated) return;
  if (overlap(player, tessa)) { state = ST.COMPLETE; completeTimer = 210; }
}

// ─── DRAW BACKGROUND ─────────────────────────────────────────────────────────
function drawBackground() {
  const theme = DAY_THEMES[day];
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, theme.sky1); g.addColorStop(1, theme.sky2);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, GROUND_Y);

  ctx.fillStyle = '#fff';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 173 + day * 37) % levelW) - camera;
    const sy = (i * 59 + day * 13) % 160;
    if (sx >= 0 && sx <= W) ctx.fillRect(sx|0, sy|0, 2, 2);
  }
  const moonX = (levelW * 0.1 - camera + W * 0.7) % (W * 1.5) - W * 0.25;
  ctx.fillStyle = '#FFFACD';
  ctx.beginPath(); ctx.arc(moonX, 55, 22, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = theme.sky1;
  ctx.beginPath(); ctx.arc(moonX + 8, 50, 18, 0, Math.PI * 2); ctx.fill();

  for (const obj of bgObjects) {
    const sx = obj.x - camera;
    if (sx + (obj.w || 20) < 0 || sx > W) continue;
    if (obj.type === 'building') {
      pixelRect(sx, GROUND_Y - obj.h, obj.w, obj.h, obj.color);
      pixelRect(sx, GROUND_Y - obj.h, obj.w, 4, 'rgba(255,255,255,0.08)');
      for (const win of obj.wins) {
        ctx.fillStyle = win.lit ? '#FFFAAA' : '#111';
        ctx.fillRect(sx + win.wx|0, GROUND_Y - obj.h + win.wy|0, 7, 9);
      }
    } else {
      pixelRect(sx + 3, GROUND_Y - 75, 4, 75, '#777');
      pixelRect(sx - 2, GROUND_Y - 78, 14, 5, '#999');
      ctx.fillStyle = 'rgba(255,255,160,0.25)';
      ctx.beginPath(); ctx.arc(sx + 5, GROUND_Y - 72, 22, 0, Math.PI * 2); ctx.fill();
      pixelRect(sx, GROUND_Y - 79, 10, 5, '#FFFF99');
    }
  }
}

function drawGround() {
  pixelRect(0, GROUND_Y, W, H - GROUND_Y, '#8a8e8e');

  ctx.fillStyle = '#767b7b';

function drawPlatforms() {

function drawInsultBubble(cx, ty, text) {

    pixelRect(bx, 48, bw, 14, '#330011');
    const bRatio = boss.hp / boss.maxHp;
    pixelRect(bx + 2, 50, Math.round((bw-4) * bRatio), 10, '#FF1493');
    ctx.strokeStyle = '#FF44AA'; ctx.lineWidth = 2; ctx.strokeRect(bx, 48, bw, 14);
    for (let i = 1; i < boss.maxHp; i++) {
      const segX = bx + (bw * i / boss.maxHp);
      pixelRect(segX - 1, 48, 2, 14, '#330011');
    }
  }
}

// ─── DRAW SCREENS ────────────────────────────────────────────────────────────
function drawOverlay(alpha=0.72) {
  ctx.fillStyle = `rgba(0,0,0,${alpha})`; ctx.fillRect(0,0,W,H);
}

function drawTitle() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060614'); g.addColorStop(1,'#180a28');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  for (let i = 0; i < 80; i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.3+(i%3)*0.2})`;
    ctx.fillRect((i*173+41)%W,(i*59+7)%200,2,2);
  }
  drawText("CARLY'S LONG DAY", W/2, 80, 42, '#FFD700');
  ctx.font='bold 42px monospace'; ctx.textAlign='center';
  ctx.strokeStyle='#882200'; ctx.lineWidth=3; ctx.strokeText("CARLY'S LONG DAY", W/2, 80);
  drawText('Get home to baby Tessa!', W/2, 118, 16, '#FF99BB');
  drawText('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', W/2, 136, 10, '#444');
  const tips = [
    ['MOVE','A / D  or  ← →'],
    ['JUMP','SPACE  or  W  or  ↑'],
    ['DEFEAT','Jump on Mean Ladies (+150 pts)'],
    ['WINE 🍷','+10 pts — mostly on platforms!'],
    ['REESES 🍫','+25 pts & +30 HP — very rare'],
    ['DANGER','Jump over thrown objects!'],
    ['SUNDAY','Defeat Mega Karen to win!'],
  ];
  tips.forEach(([k,v],i) => {
    drawText(k, W/2-80, 165+i*26, 11, '#FFD700', 'right');
    drawText(v, W/2-68, 165+i*26, 11, '#ccc', 'left');
  });
  const p = 0.6 + Math.sin(Date.now()/380) * 0.4;
  ctx.globalAlpha = p;
  drawText('PRESS  SPACE  TO  START', W/2, 420, 18, '#FFD700');
  ctx.globalAlpha = 1;
}

function drawDayIntro() {
  drawOverlay(0.78);
  const t = introTimer;
  const scale = t < 120 ? 1 : 1 + (t-120)/30*0.4;
  ctx.save(); ctx.translate(W/2, H/2); ctx.scale(scale,scale);
  drawText(DAYS[day], 0, -20, 52, '#FFD700', 'center');
  ctx.restore();
  drawText('Get home to Tessa!', W/2, H/2+36, 18, '#fff');
  drawText(DAY_THEMES[day].desc, W/2, H/2+66, 12, '#aaaaaa');
  if (day === 6) drawText('⚡ MEGA KAREN AWAITS ⚡', W/2, H/2+90, 13, '#FF44AA');
}

function drawLevelComplete() {
  drawOverlay(0.8);
  drawText('YOU MADE IT HOME!', W/2, H/2-60, 32, '#FFD700');
  drawText(`${DAYS[day]} Complete!`, W/2, H/2-18, 20, '#FF99BB');
  drawText(`Day score:   ${dayScore}`, W/2, H/2+18, 16, '#fff');
  drawText(`Total score: ${score+dayScore}`, W/2, H/2+44, 16, '#FFD700');
  if (day < 6) drawText(`Next: ${DAYS[day+1]}`, W/2, H/2+78, 14, '#88AAFF');
  const p = 0.5+Math.sin(Date.now()/400)*0.5; ctx.globalAlpha=p;
  drawText('SPACE to continue', W/2, H/2+108, 13, '#aaa');
  ctx.globalAlpha=1;
}

function drawGameOver() {
  ctx.fillStyle='#0e0000'; ctx.fillRect(0,0,W,H);
  for (let i=0;i<40;i++) { ctx.fillStyle=`rgba(180,0,0,${0.05+(i%4)*0.03})`; ctx.fillRect((i*137)%W,(i*61)%H,3,3); }
  drawText('GAME OVER', W/2, 160, 56, '#FF2222');
  ctx.font='bold 56px monospace'; ctx.textAlign='center';
  ctx.strokeStyle='#660000'; ctx.lineWidth=3; ctx.strokeText('GAME OVER',W/2,160);
  drawText('The mean ladies won this week.', W/2, 220, 17, '#cc8888');
  drawText(`You made it to ${DAYS[day]}`, W/2, 256, 15, '#aaa');
  drawText(`Final Score: ${score}`, W/2, 292, 20, '#FFD700');
  const p=0.5+Math.sin(Date.now()/400)*0.5; ctx.globalAlpha=p;
  drawText('PRESS SPACE TO TRY AGAIN', W/2, 380, 16, '#FF6666');
  ctx.globalAlpha=1;
}

function drawWin() {
  // Background
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#050a1a'); g.addColorStop(1,'#0a0518');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // Confetti
  for (let i=0;i<70;i++) {
    const t=(Date.now()/18+i*47)%H;
    ctx.fillStyle=['#FFD700','#FF69B4','#00CED1','#FF6347','#98FB98','#DDA0DD'][i%6];
    ctx.fillRect(((i*137+23)%W)|0,t|0,5,5);
  }

  drawText('YOU SURVIVED THE WEEK!', W/2, 44, 28, '#FFD700');
  ctx.font='bold 28px monospace'; ctx.textAlign='center';
  ctx.strokeStyle='#884400'; ctx.lineWidth=2; ctx.strokeText('YOU SURVIVED THE WEEK!',W/2,44);

  // Hug scene — Carly on left facing right, Tessa on right facing left (flipped)
  const hugCY = 80; // center y for the hug scene
  const carlyX = W/2 - 70;
  const tessaX = W/2 + 24;

  // Draw Carly (facing right — normal)
  drawPlayerAt(carlyX, hugCY, true, 0, false, 0);
  // Draw Tessa (facing left — flip)
  drawTessa(tessaX, hugCY - 4, true);

  // Draw overlapping arms (hug detail)
  pixelRect(W/2 - 8, hugCY + 22, 18, 10, '#1a1a1a'); // Carly's right arm reaching
  pixelRect(W/2 - 6, hugCY + 18, 16, 8, '#FDDBB4');  // skin over arm

  // Hearts floating above them
  const hearts = ['♥','♡','♥','♡'];
  hearts.forEach((h, i) => {
    const hx = W/2 - 30 + i * 20;
    const hy = hugCY - 16 + Math.sin(Date.now()/400 + i) * 5;
    const sz = i%2===0 ? 16 : 12;
    const col = i%2===0 ? '#FF69B4' : '#FF99CC';
    drawText(h, hx, hy, sz, col);
  });

  drawText(`FINAL SCORE: ${score}`, W/2, hugCY + 78, 22, '#fff');

  // Leaderboard
  const lb = getLeaderboard();
  const lbY = hugCY + 108;
  drawText('━━━━━━  HIGH SCORES  ━━━━━━', W/2, lbY, 12, '#FFD700');
  if (lb.length === 0) {
    drawText('No scores yet!', W/2, lbY + 22, 12, '#666');
  } else {
    lb.slice(0, 6).forEach((entry, i) => {
      const isNew = i === 0 && !scoreSaved;
      const col = i === 0 ? '#FFD700' : i === 1 ? '#CCCCCC' : i === 2 ? '#CD7F32' : '#888';
      const rank = ['🥇','🥈','🥉','4.','5.','6.'][i];
      const line = `${rank}  ${String(entry.score).padStart(6,' ')}   ${entry.date}`;
      drawText(line, W/2, lbY + 22 + i * 22, 12, col);
      if (entry.score === score && i === lb.findIndex(e=>e.score===score)) {
        drawText('◄ YOU', W/2 + 130, lbY + 22 + i * 22, 11, '#FFD700', 'left');
      }
    });
  }

  const p=0.5+Math.sin(Date.now()/400)*0.5; ctx.globalAlpha=p;
  drawText('PRESS SPACE TO PLAY AGAIN', W/2, H - 18, 14, '#FFD700');
  ctx.globalAlpha=1;
}

// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  if (state===ST.TITLE)    { drawTitle();    return; }
  if (state===ST.GAMEOVER) { drawGameOver(); return; }
  if (state===ST.WIN)      { drawWin();      return; }

  drawBackground();
  drawGround();
  drawPlatforms();
  drawCollectibles();
  drawTessa();
  drawEnemies();
  drawBoss();
  drawProjectiles();
  drawPlayer();
  drawHUD();

  if (state===ST.INTRO)    drawDayIntro();
  if (state===ST.COMPLETE) drawLevelComplete();
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
state=ST.TITLE; lives=3; score=0; day=0;
function loop() { update(); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
